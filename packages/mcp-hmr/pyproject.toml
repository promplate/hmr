[project]
name = "mcp-hmr"
description = "Hot Module Reloading for MCP (Model Context Protocol) servers"
version = "0.1.0"
readme = "README.md"
requires-python = ">=3.12"
keywords = ["mcp", "hot-reload", "hmr", "reload", "server", "model-context-protocol"]
authors = [{ name = "MCP HMR", email = "dev@mcp-hmr.dev" }]
license = "MIT"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "dowhen~=0.1",
    "hmr>=0.5.0,<0.8",
    "typer-slim>=0.15.4,<1",
    "watchfiles>=0.20.0",
]

[project.scripts]
mcp-hmr = "mcp_hmr:app"

[project.urls]
Homepage = "https://github.com/mcp-hmr/mcp-hmr"
Repository = "https://github.com/mcp-hmr/mcp-hmr"

[build-system]
requires = ["pdm-backend"]
build-backend = "pdm.backend"
