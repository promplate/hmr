[project]
site_name = "HMR for Python"
site_description = "Hot Module Reload (HMR) ecosystem for Python - docs and examples."
site_url = "https://hmr.promplate.dev/"
repo_url = "https://github.com/promplate/hmr"
repo_name = "promplate/hmr"
extra_css = ["stylesheets/extra.css", "stylesheets/transition.css"]
site_author = "Muspi Merol"
copyright = """
<span style="opacity: 0.7"> &copy; 2025 </span>
<a href="https://github.com/CNSeniorious000"> Muspi Merol </a>
"""
nav = [
    { "Getting Started" = [
        { "Introduction" = "index.md" },
        { "What is HMR?" = "getting-started/what-is-hmr.md" },
        { "Installation" = "getting-started/installation.md" },
        { "Quick Start" = "getting-started/quick-start.md" },
        { "Contributing" = "contributing.md" },
    ] },
    { "HMR Integrations" = [
        { "Demo Project" = "integrations/demo.md" },
        { "MCP Server" = "integrations/mcp.md" },
        { "ASGI (Uvicorn)" = "integrations/uvicorn.md" },
        { "Flask" = "integrations/flask.md" },
    ] },
    { "Reactive Programming" = [
        { "Overview" = "reactive/index.md" },
        { "Signals" = "reactive/signals.md" },
        { "Effects" = "reactive/effects.md" },
        { "Derived Values" = "reactive/derived.md" },
        { "Advanced Patterns" = "reactive/advanced.md" },
    ] },
    { "References" = [
        { "HMR Core" = [
            { "<code>.</code>" = "references/reactivity/index.md" },
            { "<code>.primitives</code>" = "references/reactivity/primitives.md" },
            { "<code>.async_primitives</code>" = "references/reactivity/async_primitives.md" },
            { "<code>.context</code>" = "references/reactivity/context.md" },
            { "<code>.helpers</code>" = "references/reactivity/helpers.md" },
            { "<code>.collections</code>" = "references/reactivity/collections.md" },
            { "<code>.hmr</code>" = "references/hmr/index.md" },
            { "<code>.hmr.core</code>" = "references/hmr/core.md" },
            { "<code>.hmr.hooks</code>" = "references/hmr/hooks.md" },
            { "<code>.hmr.fs</code>" = "references/hmr/fs.md" },
            { "<code>.hmr.api</code>" = "references/hmr/api.md" },
            { "<code>.hmr.run</code>" = "references/hmr/run.md" },
            { "<code>.hmr.exec_hack</code>" = "references/hmr/exec_hack.md" },
        ] },
        { "Integrations" = [
            { "<code>hmr-daemon</code>" = "references/hmr-daemon.md" },
            { "<code>uvicorn-hmr</code>" = "references/uvicorn-hmr.md" },
            { "<code>fastapi-reloader</code>" = "references/fastapi-reloader.md" },
            { "<code>mcp-hmr</code>" = "references/mcp-hmr.md" },
        ] },
    ] },
]

[[project.extra.social]]
icon = "material/github"
link = "https://github.com/promplate/hmr"
name = "GitHub Repository"

[[project.extra.social]]
icon = "material/language-python"
link = "https://pypi.org/project/hmr/"
name = "HMR on PyPI"

[[project.extra.social]]
icon = "material/web"
link = "https://pyth-on-line.promplate.dev/hmr"
name = "Official Website"

[project.theme]
variant = "modern"
features = [
    "search.highlight",
    "navigation.instant",
    "navigation.instant.progress",
    "navigation.instant.prefetch",
    "navigation.tabs",
    "navigation.sections",
    "navigation.footer",
    "toc.follow",
    "content.code.copy",
    "content.tooltips",
]
favicon = "https://promplate.dev/favicon.png"
custom_dir = "docs/overrides"

[project.theme.icon]
logo = "simple/pypi"
repo = "material/github"

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "material/lightbulb-variant-outline"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "material/lightbulb-variant"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "material/lightbulb-outline"
toggle.name = "Switch to system preference"

[project.plugins.mkdocstrings.handlers.python.options]
members_order = "source"
docstring_style = "numpy"
show_if_no_docstring = true
modernize_annotations = true
show_symbol_type_heading = true
heading_level = 3
overloads_only = true
show_signature_annotations = true
show_signature_type_parameters = true
separate_signature = true
filters = [".*"]
show_root_toc_entry = false
show_symbol_type_toc = true
